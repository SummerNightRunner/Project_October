services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: project_october
      POSTGRES_USER: project_october
      POSTGRES_PASSWORD: project_october_local_password
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_october -d project_october"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: .
    environment:
      PROJECT_OCTOBER_DATABASE_URL: postgresql+psycopg://project_october:project_october_local_password@db:5432/project_october
      PROJECT_OCTOBER_PROCESSED_METADATA: /app/data/processed/processed_metadata.csv
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  postgres_data:
    name: project_october_postgres_data
